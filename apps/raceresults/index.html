<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>RaceResults</title>
<link rel="stylesheet" href="/apps/shared/ui.css">
<link rel="stylesheet" href="/apps/shared/print.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="appbar">
	<h1>RaceResults</h1>
	<nav>
		<a href="/apps/mastereditor/">MasterEditor</a>
		<a href="/apps/umaeditor/">UmaEditor</a>
		<a href="/apps/yuma/">YUMA</a>
	</nav>
</header>

<main class="race-results">
	<section class="controls">
		<div class="section-title">開催</div>
		<div class="form-grid">
			<label>
				<span>年</span>
				<input id="year" type="number" inputmode="numeric" min="1986" max="2100">
			</label>
			<label>
				<span>場</span>
				<select id="jyo"></select>
			</label>
			<label>
				<span>回</span>
				<input id="kaiji" type="number" inputmode="numeric" min="1" max="9">
			</label>
			<label>
				<span>日</span>
				<input id="nichiji" type="number" inputmode="numeric" min="1" max="12">
			</label>
		</div>

		<div class="button-row">
			<button id="loadDay">レース取得</button>
			<button id="importRace">JV取込</button>
		</div>

		<div class="section-title">レース</div>
		<div id="raceList" class="race-list"></div>

		<div class="section-title">ペース</div>
		<div class="pace-grid">
			<label><span>二角</span><input id="nikaku" type="text"></label>
			<label><span>向正面</span><input id="mukousyou" type="text"></label>
			<label><span>三角</span><input id="sankaku" type="text"></label>
			<label><span>四角</span><input id="yonkaku" type="text"></label>
		</div>

		<div class="button-row">
			<button id="render">描画</button>
			<button id="print" disabled>印刷</button>
		</div>

		<div class="section-title">馬名検索</div>
		<div class="search-row">
			<input id="bamei" type="text">
			<select id="searchType">
				<option>一致</option>
				<option>前方一致</option>
				<option>後方一致</option>
				<option>含む</option>
			</select>
			<button id="search">検索</button>
		</div>
		<div id="searchResults" class="search-results"></div>
	</section>

	<section class="preview-area">
		<div class="preview-toolbar">
			<div id="raceTitle" class="race-title">未選択</div>
			<div id="status" class="status">開催を指定してレース取得</div>
		</div>
		<div id="preview" class="preview"></div>
	</section>
</main>

<script type="module" src="main.js"></script>
</body>
</html>
